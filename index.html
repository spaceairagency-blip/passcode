<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple JS Password Vault</title>
    <style>
        /* CSS: Styling the UI */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            padding: 50px;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 400px;
        }
        h2 { text-align: center; color: #333; }
        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 10px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover { background-color: #0056b3; }
        .entry-list { margin-top: 20px; border-top: 1px solid #eee; }
        .entry-item {
            padding: 10px;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .delete-btn {
            background: #ff4757;
            width: auto;
            padding: 5px 10px;
            font-size: 12px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Password Vault</h2>
    
    <div id="add-form">
        <input type="text" id="siteName" placeholder="Website Name (e.g. Google)">
        <input type="text" id="username" placeholder="Username/Email">
        <input type="password" id="password" placeholder="Password">
        <button onclick="savePassword()">Save Password</button>
    </div>

    <div class="entry-list" id="passwordList">
        </div>
</div>

<script>
    // JS: Handling Logic and Storage
    const passwordListDiv = document.getElementById('passwordList');

    // Load data on startup
    window.onload = displayPasswords;

    function savePassword() {
        const site = document.getElementById('siteName').value;
        const user = document.getElementById('username').value;
        const pass = document.getElementById('password').value;

        if (!site || !user || !pass) {
            alert("Please fill in all fields!");
            return;
        }

        const entry = { site, user, pass };

        // Get existing passwords from LocalStorage
        let passwords = JSON.parse(localStorage.getItem('myPasswords')) || [];
        
        // Add new entry
        passwords.push(entry);
        
        // Save back to LocalStorage
        localStorage.setItem('myPasswords', JSON.stringify(passwords));

        // Clear inputs and refresh list
        document.getElementById('siteName').value = '';
        document.getElementById('username').value = '';
        document.getElementById('password').value = '';
        displayPasswords();
    }

    function displayPasswords() {
        let passwords = JSON.parse(localStorage.getItem('myPasswords')) || [];
        passwordListDiv.innerHTML = '<h3>Stored Accounts</h3>';

        if (passwords.length === 0) {
            passwordListDiv.innerHTML += '<p style="color:gray; font-size:14px;">No passwords saved yet.</p>';
        }

        passwords.forEach((item, index) => {
            passwordListDiv.innerHTML += `
                <div class="entry-item">
                    <div>
                        <strong>${item.site}</strong><br>
                        <small>${item.user} | ${item.pass}</small>
                    </div>
                    <button class="delete-btn" onclick="deletePassword(${index})">Delete</button>
                </div>
            `;
        });
    }

    function deletePassword(index) {
        let passwords = JSON.parse(localStorage.getItem('myPasswords'));
        passwords.splice(index, 1);
        localStorage.setItem('myPasswords', JSON.stringify(passwords));
        displayPasswords();
    }
</script>

</body>
</html>
