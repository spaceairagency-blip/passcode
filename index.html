<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bio-Secure Vault</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f4f7f6; display: flex; justify-content: center; padding: 20px; }
        .card { background: white; padding: 25px; border-radius: 16px; box-shadow: 0 8px 30px rgba(0,0,0,0.1); width: 100%; max-width: 350px; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 14px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; margin-top: 10px; transition: 0.2s; }
        .btn-add { background: #28a745; color: white; }
        .btn-view { background: #007bff; color: white; width: auto; padding: 6px 12px; font-size: 12px; }
        .entry { background: #f9f9f9; padding: 12px; margin-top: 10px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #eee; }
        .hidden { display: none; }
        h2 { text-align: center; margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="card">
    <h2>My Passwords 🔑</h2>
    
    <div id="setup-ui">
        <p style="font-size: 14px; color: #666;">To start, link this app to your phone's security.</p>
        <button class="btn-add" onclick="register()">Enable Fingerprint</button>
    </div>

    <div id="vault-ui" class="hidden">
        <input type="text" id="siteName" placeholder="Site (e.g. Netflix)">
        <input type="password" id="sitePass" placeholder="Password">
        <button class="btn-add" onclick="saveNew()">Save with Fingerprint</button>
        
        <div id="list-container" style="margin-top: 25px;">
            <p style="font-size: 13px; color: #999; font-weight: bold; text-transform: uppercase;">Stored Accounts</p>
            <div id="items"></div>
        </div>
    </div>
</div>

<script>
    let vault = JSON.parse(localStorage.getItem('my_secrets') || '[]');

    // On Load: Check if setup is done
    if (localStorage.getItem('setup_done')) {
        showVault();
    }

    function showVault() {
        document.getElementById('setup-ui').classList.add('hidden');
        document.getElementById('vault-ui').classList.remove('hidden');
        renderEntries();
    }

    // AUTHENTICATION LOGIC
    async function authenticate() {
        try {
            // Real WebAuthn trigger
            const options = {
                publicKey: {
                    challenge: new Uint8Array([1, 2, 3, 4]),
                    authenticatorSelection: { userVerification: "required" },
                    pubKeyCredParams: [{ alg: -7, type: "public-key" }]
                }
            };
            // This pops up the Fingerprint/FaceID system tray
            await navigator.credentials.create(options);
            return true;
        } catch (e) {
            console.error(e);
            alert("Security Check Failed: Please scan fingerprint.");
            return false;
        }
    }

    // REGISTRATION
    async function register() {
        if (await authenticate()) {
            localStorage.setItem('setup_done', 'true');
            showVault();
        }
    }

    // SAVE NEW PASSWORD
    async function saveNew() {
        const site = document.getElementById('siteName').value;
        const pass = document.getElementById('sitePass').value;
        
        if (!site || !pass) return alert("Enter both fields");

        if (await authenticate()) {
            vault.push({ site, pass });
            localStorage.setItem('my_secrets', JSON.stringify(vault));
            renderEntries();
            document.getElementById('siteName').value = '';
            document.getElementById('sitePass').value = '';
        }
    }

    // VIEW PASSWORD (RE-AUTHENTICATE)
    async function viewItem(index) {
        if (await authenticate()) {
            const item = vault[index];
            alert(`Password for ${item.site} is: \n\n ${item.pass}`);
        }
    }

    function renderEntries() {
        const container = document.getElementById('items');
        container.innerHTML = vault.map((entry, i) => `
            <div class="entry">
                <div>
                    <strong style="display:block;">${entry.site}</strong>
                    <span style="color:#aaa; font-size:12px;">••••••••</span>
                </div>
                <button class="btn-view" onclick="viewItem(${i})">View</button>
            </div>
        `).join('');
    }
</script>
</body>
</html>
