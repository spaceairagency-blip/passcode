<!DOCTYPE html>
<html>
<head>
    <title>Fingerprint Vault</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: sans-serif; text-align: center; background: #fafafa; padding: 20px; }
        .card { max-width: 400px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        button { background: #007bff; color: white; border: none; padding: 12px 20px; border-radius: 8px; width: 100%; cursor: pointer; margin-top: 10px; }
        .hidden { display: none; }
        .entry { text-align: left; background: #eee; margin: 5px 0; padding: 10px; border-radius: 5px; }
    </style>
</head>
<body>

<div class="card">
    <h2>Fingerprint Vault</h2>
    
    <div id="setup">
        <p>Set up your device fingerprint to start.</p>
        <button onclick="registerBio()">Enable Fingerprint</button>
    </div>

    <div id="vault" class="hidden">
        <input type="text" id="site" placeholder="Site Name" style="width:90%; padding:10px; margin-bottom:5px;">
        <input type="password" id="pass" placeholder="Password" style="width:90%; padding:10px;">
        <button onclick="saveSecret()">Save with Fingerprint</button>
        <div id="list" style="margin-top:20px;"></div>
    </div>
</div>

<script>
    const setupDiv = document.getElementById('setup');
    const vaultDiv = document.getElementById('vault');
    let secrets = JSON.parse(localStorage.getItem('secrets') || '[]');

    // 1. Check if biometrics are even available on this device/browser
    async function checkSupport() {
        if (!window.PublicKeyCredential) return alert("WebAuthn not supported");
        const available = await PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable();
        if (!available) alert("No fingerprint/face sensor found on this device.");
    }
    checkSupport();

    // 2. The Actual Fingerprint Trigger (Registration)
    async function registerBio() {
        try {
            // This is the standard WebAuthn "handshake"
            const options = {
                publicKey: {
                    challenge: new Uint8Array([1,2,3,4]), // Normally from a server
                    rp: { name: "My Vault" },
                    user: { id: new Uint8Array([1]), name: "user", displayName: "User" },
                    pubKeyCredParams: [{ alg: -7, type: "public-key" }],
                    authenticatorSelection: { authenticatorAttachment: "platform", userVerification: "required" }
                }
            };
            await navigator.credentials.create(options);
            localStorage.setItem('bio_enabled', 'true');
            showVault();
        } catch (e) {
            alert("Security check failed: " + e.message);
        }
    }

    // 3. The Verification Trigger (Authentication)
    async function verifyBio() {
        try {
            const options = {
                publicKey: {
                    challenge: new Uint8Array([1,2,3,4]),
                    allowCredentials: [], // In a real app, you'd pass the registered ID
                    userVerification: "required"
                }
            };
            // This triggers the native Fingerprint/FaceID/PIN popup
            await navigator.credentials.get(options);
            return true;
        } catch (e) {
            console.error(e);
            return false;
        }
    }

    async function saveSecret() {
        const site = document.getElementById('site').value;
        const pass = document.getElementById('pass').value;
        if (await verifyBio()) {
            secrets.push({ site, pass });
            localStorage.setItem('secrets', JSON.stringify(secrets));
            render();
        }
    }

    function showVault() {
        setupDiv.classList.add('hidden');
        vaultDiv.classList.remove('hidden');
        render();
    }

    function render() {
        document.getElementById('list').innerHTML = secrets.map(s => `
            <div class="entry"><b>${s.site}</b>: ***** </div>
        `).join('');
    }

    if (localStorage.getItem('bio_enabled')) showVault();
</script>
</body>
</html>
